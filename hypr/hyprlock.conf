general {
    hide_cursor = false
    grace = 0
    no_fade_in = false
    no_fade_out = false
}

# ── OLED (HDMI-A-1) ─────────────────────────────────────────────────────────
# Solid black only — no widgets, no burn-in risk
background {
    monitor = HDMI-A-1
    color = rgba(0, 0, 0, 1.0)
}

# ── DP-1 (main 1440p) ───────────────────────────────────────────────────────
background {
    monitor = DP-1
    path = screenshot
    blur_size = 6
    blur_passes = 3
    brightness = 0.7
    vibrancy = 0.1696
}

label {
    monitor = DP-1
    text = cmd[update:1000] date +"%H:%M:%S"
    color = rgba(255, 255, 255, 0.9)
    font_size = 72
    font_family = Rubik
    halign = center
    valign = center
    position = 0, 140
    shadow_passes = 2
    shadow_size = 4
}

label {
    monitor = DP-1
    text = cmd[update:60000] date +"%A, %-d %B"
    color = rgba(255, 255, 255, 0.55)
    font_size = 18
    font_family = Rubik
    halign = center
    valign = center
    position = 0, 60
    shadow_passes = 2
    shadow_size = 4
}

input-field {
    monitor = DP-1
    size = 380, 36
    position = 0, -60
    halign = center
    valign = center

    outline_thickness = 2
    rounding = 12

    inner_color = rgba(26, 26, 26, 0.88)
    outer_color = rgba(51, 204, 255, 0.8)
    check_color = rgba(0, 255, 153, 0.9)
    fail_color = rgba(255, 80, 80, 0.9)
    font_color = rgba(255, 255, 255, 0.9)

    font_family = Rubik
    placeholder_text = <i>Password</i>
    fail_text = <i>$FAIL</i>

    hide_input = false
    dots_size = 7
    dots_spacing = 10
    dots_rounding = 10
    dots_center = true

    capslock_color = rgba(255, 200, 80, 0.9)
}

# ── HDMI-A-2 (secondary 1440p) ──────────────────────────────────────────────
background {
    monitor = HDMI-A-2
    path = screenshot
    blur_size = 6
    blur_passes = 3
    brightness = 0.7
    vibrancy = 0.1696
}

label {
    monitor = HDMI-A-2
    text = cmd[update:1000] date +"%H:%M:%S"
    color = rgba(255, 255, 255, 0.9)
    font_size = 72
    font_family = Rubik
    halign = center
    valign = center
    position = 0, 40
    shadow_passes = 2
    shadow_size = 4
}

label {
    monitor = HDMI-A-2
    text = cmd[update:60000] date +"%A, %-d %B"
    color = rgba(255, 255, 255, 0.55)
    font_size = 18
    font_family = Rubik
    halign = center
    valign = center
    position = 0, -40
    shadow_passes = 2
    shadow_size = 4
}
